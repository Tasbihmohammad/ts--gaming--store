<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>TS Store</title>
</head>

<body>
  <div class="header">
    <img class="logo" src="images/ts.jpeg" />

    <div class="header-links">
      <a href="#">home</a>
      <a href="#">our shop</a>
      <a href="#">contact</a>
      <a href="#">about</a>
      <button class="btn">sign in</button>
    </div>
  </div>

  <div class="landing-page">
    <div class="landing-page-left-section">
      <span>welcome to TS Store</span>
      <h1>Best Gaming Site Ever!</h1>
      <p>
        TS gaming is free Bootstrap 5 HTML CSS website template for your gaming websites.
        You can download and use this layout for commercial purposes.
      </p>

      <div class="landing-page-search">
        <input placeholder="start typing" />
        <button class="btn">Search</button>
      </div>
    </div>

    <div class="landing-page-image-container">
      <img src="images/gaming.jpg" />
    </div>
  </div>

  <div class="trending-container">
    <span>TRENDING</span>

    <div class="trending-header">
      <h1>Trending Games</h1>
      <button class="btn">view all</button>
    </div>

    <div class="trending-cards">

      <div class="card">
        <img class="thumb" src="images/mario.jpg" />
        <div class="card-info">
          <div class="card-name">
            <p>Adventure</p>
            <h3>Mario</h3>
          </div>
          <a><img src="images/icon.jpeg" /></a>
        </div>
      </div>

      <div class="card">
        <img class="thumb" src="images/uno.jpg" />
        <div class="card-info">
          <div class="card-name">
            <p>Cards</p>
            <h3>UNO</h3>
          </div>
          <a><img src="images/icon.jpeg" /></a>
        </div>
      </div>

      <div class="card">
        <img class="thumb" src="images/ludo.jpg" />
        <div class="card-info">
          <div class="card-name">
            <p>Board</p>
            <h3>Ludo</h3>
          </div>
          <a><img src="images/icon.jpeg" /></a>
        </div>
      </div>

      <div class="card">
        <img class="thumb" src="images/blox.png" />
        <div class="card-info">
          <div class="card-name">
            <p>Action</p>
            <h3>Blox</h3>
          </div>
          <a><img src="images/icon.jpeg" /></a>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
